
name: Build Golden Studio APK

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux Packages
        run: |
          sudo apt update

          sudo apt install -y \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip

          pip install Cython==0.29.33

          pip install buildozer==1.5.0

      - name: Prepare Android SDK
        run: |

          mkdir -p ~/.android

          touch ~/.android/repositories.cfg

          yes | buildozer android update || true

          SDK="$HOME/.buildozer/android/platform/android-sdk"

          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses || true

          $SDK/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: 0
        run: |
          buildozer android debug

      - name: Upload APK
        if: success()

        uses: actions/upload-artifact@v4

        with:

          name: GoldenStudio-APK

          path: |
            bin/*.apk
